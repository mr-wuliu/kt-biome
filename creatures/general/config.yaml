name: general
version: "1.0"

controller:
  # LLM is resolved from: --llm flag > default model (kt model default) > inline config
  # Set a default: kt model default gemini-3.1-pro
  tool_format: native

system_prompt_file: prompts/system.md
skill_mode: dynamic

tools:
  - { name: bash, type: builtin }
  - { name: python, type: builtin }
  - { name: read, type: builtin }
  - { name: write, type: builtin }
  - { name: edit, type: builtin }
  - { name: glob, type: builtin }
  - { name: grep, type: builtin }
  - { name: tree, type: builtin }
  - { name: think, type: builtin }
  - { name: scratchpad, type: builtin }
  - { name: info, type: builtin }
  - { name: ask_user, type: builtin }
  - { name: json_read, type: builtin }
  - { name: json_write, type: builtin }
  - { name: send_message, type: builtin }
  - { name: stop_task, type: builtin }
  - { name: list_triggers, type: builtin }
  - { name: create_trigger, type: builtin }
  - { name: search_memory, type: builtin }
  - { name: web_fetch, type: builtin }
  - { name: web_search, type: builtin }

subagents:
  - { name: explore, type: builtin }
  - { name: plan, type: builtin }
  - { name: worker, type: builtin }
  - { name: critic, type: builtin }
  - { name: summarize, type: builtin }
  - { name: research, type: builtin }

output:
  type: stdout
  controller_direct: true

memory:
  embedding:
    provider: model2vec
    model: "@retrieval"
    # model2vec presets: @tiny (2M/64d), @base (8M/256d), @retrieval (32M/512d),
    #   @multilingual (128M/256d/101langs), @science (32M/256d/arxiv+pubmed)
    # sentence-transformer presets: @tiny (granite-30m), @small (granite-47m/8K),
    #   @base (gte-modernbert/8K), @nomic (nomic-v1.5/8K), @gemma (embeddinggemma-300m),
    #   @multilingual (gte-multilingual/8K/70langs)
    # Or use any HuggingFace model path directly

# compact.max_tokens auto-derived from model's max_context
