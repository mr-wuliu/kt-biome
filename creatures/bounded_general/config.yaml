name: bounded_general
version: "1.0"

# Inherit everything from the standard general creature.
base_config: "@kt-biome/creatures/general"

# Cap the shared iteration pool at 50 LLM turns for this creature.
# Parent controller + any inheriting sub-agents draw from the same
# counter; when drained, a ``BudgetExhausted`` signal stops the run.
# See ``src/kohakuterrarium/core/budget.py`` for the type.
max_iterations: 50
