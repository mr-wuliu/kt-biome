name: kt-biome
version: "0.4.0"
description: "Default creatures, terrariums, plugins, tools, I/O, and triggers for KohakuTerrarium"
author: "Kohaku-Lab"
repository: "https://github.com/Kohaku-Lab/kt-biome"

creatures:
  - name: general
    path: creatures/general
    description: "Base creature: 22 tools, 6 sub-agents, core personality"

  - name: swe
    path: creatures/swe
    description: "Software engineering specialist"
    base: general

  - name: researcher
    path: creatures/researcher
    description: "Research and analysis specialist"
    base: general

  - name: music
    path: creatures/music
    description: "Music composition via LilyPond"
    base: general

  - name: video
    path: creatures/video
    description: "HyperFrame video/frame composition (HTML-based)"
    base: general

  - name: diagrammer
    path: creatures/diagrammer
    description: "Diagram composition via Mermaid, Graphviz, and D2"
    base: general

terrariums:
  - name: swe_team
    path: terrariums/swe_team
    description: "Review pipeline: two swe instances, implementer + reviewer via role prompts"
    uses: [swe]

  - name: pair_programming
    path: terrariums/pair_programming
    description: "Driver/navigator pair; two swe instances with asymmetric channel wiring"
    uses: [swe]

  - name: deep_research
    path: terrariums/deep_research
    description: "Multi-agent web research: planner, researcher, synthesizer, critic"
    uses: [general]

  - name: auto_research
    path: terrariums/auto_research
    description: "Automated research loop: ideator, coder, runner, analyzer"
    uses: [general]

plugins:
  - name: cost_tracker
    module: kt_biome.plugins.cost_tracker
    class: CostTrackerPlugin
    description: "Track LLM token usage and estimated cost per session"

  - name: event_logger
    module: kt_biome.plugins.event_logger
    class: EventLoggerPlugin
    description: "Structured JSONL event log of all agent activity"

  - name: multimodal_guard
    module: kt_biome.plugins.multimodal_guard
    class: MultimodalGuardPlugin
    description: "Rewrite multimodal LLM input into text-only placeholders before model calls"

  - name: termination_goal
    module: kt_biome.plugins.termination_goal
    class: TerminationGoalPlugin
    description: "Vote termination when a scratchpad flag (default goal_achieved) is truthy. Demonstrates pluggable termination (cluster C.2)."

  - name: context_files
    module: kt_biome.plugins.context_files
    class: ContextFilesPlugin
    description: "Walk cwd to git root for AGENTS.md / .cursorrules / .hermes.md, scan for prompt-injection, inject per-turn."

  - name: family_guidance
    module: kt_biome.plugins.family_guidance
    class: FamilyGuidancePlugin
    description: "Inject model-family-specific system guidance (openai/codex, gemini/gemma) at pre_llm_call."

tools:
  - name: database
    module: kt_biome.tools.database
    class: DatabaseTool
    description: "Execute SQL queries against a SQLite database"

  # Autonomous skill creation — proposal §4.8 / S13/S14.
  - name: skill_manage
    module: kt_biome.tools.skill_manage
    class: SkillManageTool
    description: "Create/patch/view reusable procedural skills as agentskills.io-compatible SKILL.md bundles."

io:
  - name: discord_input
    module: kt_biome.io.discord
    class: DiscordInput
    description: "Receive messages from Discord channels"

  - name: discord_output
    module: kt_biome.io.discord
    class: DiscordOutput
    description: "Send agent responses to Discord channels"

prompts:
  - name: git-safety
    path: prompts/git-safety.md
    description: "Shared git-safety rules — do not commit/push/amend without asking; no reset --hard, force push, or hook-skipping."

skills:
  - name: git-commit-flow
    path: skills/git-commit-flow
    description: "Conventional-commit workflow: run tests first, stage deliberately, write a readable message. Activates on common source-file paths."

  - name: pdf-merge
    path: skills/pdf-merge
    description: "Merge / split PDFs safely via qpdf or pdftk. Activates on *.pdf paths."

  - name: todo-file
    path: skills/todo-file
    description: "Maintain a user-visible todo.md / plan.md across multiple turns. Activates on todo.md / plan.md paths."

triggers:
  - name: webhook
    module: kt_biome.triggers.webhook
    class: WebhookTrigger
    description: "Receive HTTP POST webhooks as agent events"

  # Autonomous-skill-creation nudge — proposal §4.8 / S13.
  - name: skill_nudge
    module: kt_biome.triggers.skill_nudge
    class: SkillNudgeTrigger
    description: "Periodic 'consider saving a skill' hint; silences itself when skill_manage is used."
